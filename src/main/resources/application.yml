server:
  port: 7284
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: password
    key-store-type: PKCS12
    key-alias: identityhub

spring:
  application:
    name: Java SpringBoot Web App
  datasource:
    url: jdbc:sqlite:contacts.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  security:
    oauth2:
      client:
        registration:
          identityhub:
            client-id: 33e1f48d-8071-4f3a-b8b5-3d0948f9a93d
            client-secret: ICALeUurpuzYfGxh38VJLGeLlC5NtYgCyT+l4/nudfY=
            client-authentication-method: client_secret_post
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/signin-oidc"
            client-name: IdentityHub
        provider:
          identityhub:
            issuer-uri: https://ogsiamapp.azurewebsites.net
            user-name-attribute: preferred_username

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG

thymeleaf:
  cache: false
